name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install -e . pytest

      - name: Run tests
        run: python -m pytest tests

      - name: Run core contract checkpoint
        run: bash scripts/checkpoint_core_contract.sh

      - name: Build package
        run: python -m build
