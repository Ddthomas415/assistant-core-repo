name: tests

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package and dev deps
        run: python -m pip install -e ".[dev]"

      - name: Run core contract tests
        run: |
          python -m pytest \
            tests/test_route_contract.py \
            tests/test_policy_contract.py \
            tests/test_pending_state_contract.py \
            tests/test_session_state_contract.py \
            tests/test_policy_engine_contract.py \
            tests/test_router_contract.py \
            tests/test_tool_registry_contract.py \
            tests/test_chat_loop_import.py \
            -q

      - name: Run conversation-layer evals
        env:
          PLANNER_MODE: heuristic
        run: python -m evals.runner

      - name: Run legacy engine tests
        run: |
          python -m pytest \
            tests/test_engine.py \
            tests/test_engine_trace.py \
            tests/test_engine_transitions.py \
            tests/test_policy.py \
            tests/test_session.py \
            tests/test_filesystem.py \
            tests/test_filesystem_boundaries.py \
            -q
        continue-on-error: true
